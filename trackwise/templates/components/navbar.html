<header class="w-full sticky top-0 z-40 glass-panel border-b border-slate-200 px-8 py-4 flex items-center justify-between transition-all duration-300">
    <div class="flex items-center gap-6">
        <a href="{% url 'trackwise_dashboard' %}" class="text-2xl font-bold tracking-tight text-slate-800 md:hidden hover:text-indigo-600 transition-colors flex items-center gap-2">
            <span class="material-symbols-outlined text-indigo-600">account_balance</span>
            TrackWise
        </a>
        <form action="{% url 'trackwise_transactions' %}" method="GET" class="hidden md:flex items-center bg-slate-100/80 hover:bg-slate-200/80 border border-slate-200 focus-within:border-indigo-300 focus-within:ring-4 focus-within:ring-indigo-500/10 focus-within:bg-white transition-all px-4 py-2.5 rounded-2xl w-96 shadow-sm">
            <span class="material-symbols-outlined text-slate-400 text-sm mr-3">search</span>
            <input name="q" value="{{ request.GET.q|default:'' }}" class="bg-transparent border-none focus:ring-0 text-sm w-full font-sans text-slate-700 placeholder-slate-400 p-0" placeholder="Search transactions, categories..." type="text"/>
            {% if request.GET.q %}
            <a href="{% url 'trackwise_transactions' %}" class="flex items-center justify-center p-1 hover:bg-slate-100 rounded-lg transition-colors group">
                <span class="material-symbols-outlined text-slate-400 text-[18px] group-hover:text-rose-500">close</span>
            </a>
            {% endif %}
        </form>
    </div>
    <div class="flex items-center gap-4">
        <a href="{% url 'trackwise_logout' %}" class="flex items-center gap-2 p-2.5 text-slate-600 hover:text-rose-600 hover:bg-rose-50 rounded-xl transition-all active:scale-95 font-bold text-sm bg-white border border-slate-200/60 shadow-sm md:hidden">
            <span class="material-symbols-outlined text-[20px]">logout</span>
        </a>
        <div class="w-px h-8 bg-slate-200 mx-2 hidden sm:block"></div>
        <a href="{% url 'trackwise_profile' %}" class="flex items-center gap-3 hover:bg-slate-100 p-1.5 pr-4 rounded-full transition-all border border-transparent hover:border-slate-200 cursor-pointer group">
            <img alt="User profile avatar" class="w-10 h-10 rounded-full object-cover border-2 border-white shadow-md group-hover:shadow-lg transition-all" src="https://ui-avatars.com/api/?name={{ user.first_name|default:user.username }}&background=6366f1&color=fff"/>
            <div class="hidden sm:block">
                <p class="text-sm font-bold text-slate-800 leading-none mb-0.5 group-hover:text-indigo-600 transition-colors">{{ user.first_name|default:user.username }}</p>
                <p class="text-[11px] text-slate-500 font-medium">Verified User</p>
            </div>
        </a>
    </div>
</header>
